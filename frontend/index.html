<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCST Face Recognition — Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/assets/css/styles.css">
</head>
<body>
  <div class="app" id="app">
    <div id="sidebar-overlay" class="mobile-overlay" onclick="App.toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="/static/images/ncst-logo.png" alt="NCST">
        <div><span class="brand-name" id="brand-name">NCST</span><span class="brand-sub">Face Recognition</span></div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <a href="#" id="sidebar-logout" style="display:flex;align-items:center;gap:.5rem;color:rgba(255,255,255,.65);text-decoration:none;font-size:.8rem;padding:.2rem 0;transition:color .15s;" title="Sign out">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Sign out</span>
        </a>
        <div style="margin-top:.25rem;opacity:.65">NCST Attendance · v1.0.0</div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-toggle" onclick="App.toggleSidebar()">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h2 class="page-title" id="page-title">Dashboard</h2>
        </div>
        <div class="topbar-right">
          <button class="notif-btn hidden" id="notif-btn" onclick="location.hash='#/dashboard/notifications'" title="Notifications">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span class="dot" id="notif-dot" style="display:none"></span>
          </button>
          <div class="user-pill">
            <div class="avatar" id="user-avatar">U</div>
            <span class="user-name" id="user-name">User</span>
          </div>
          <button class="btn btn-sm btn-secondary" id="btn-logout">Sign out</button>
        </div>
      </header>
      <main class="content" id="content"></main>
    </div>
  </div>
  <div id="toast-container"></div>

  <script src="/static/assets/js/core.js?v=4"></script>
  <script src="/static/assets/js/shared.js?v=5"></script>
  <script src="/static/assets/js/admin.js?v=6"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (!App.isAuthed()) { window.location.href = "/login"; return; }
      // Show notifications bell for students (the only role with a notifications route).
      if (App.role() === "STUDENT") {
        document.getElementById("notif-btn").classList.remove("hidden");
        App.refreshNotifBadge && App.refreshNotifBadge();
      }
      document.getElementById("btn-logout").addEventListener("click", async function () {
        try { await App.api("/auth/logout", { method: "POST" }); } catch (e) {}
        App.stopCamera(); App.clear(); window.location.href = "/login";
      });
      App.buildSidebar();
      // Wire sidebar logout link
      const sbLogout = document.getElementById("sidebar-logout");
      if (sbLogout) {
        sbLogout.addEventListener("click", async function (e) {
          e.preventDefault();
          try { await App.api("/auth/logout", { method: "POST" }); } catch (e2) {}
          App.stopCamera(); App.clear(); window.location.href = "/login";
        });
      }
      App.router.init();
    });
  </script>
</body>
</html>
